<main class="page-auth">
    <div class="page-auth__container">

        <div class="form-card">
            <h1 class="form-card__title">Login</h1>

            <form class="form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                <div class="form-group">
                    <label class="form-group__label">Email</label>
                    <input type="email" 
                    class="form-group__input"
                    formControlName="email" />

                    @if (emailControl?.invalid && emailControl?.touched) {
                        <div class="input-error">
                            @if (emailControl?.errors?.['required']) {
                                Input your email first!
                            }
                        </div>
                    }
                </div>

                <div class="form-group">
                    <label class="form-group__label">Password</label>
                    <input type="password" 
                    class="form-group__input"
                    formControlName="password" />

                    @if (passwordControl?.invalid && passwordControl?.touched) {
                        <div class="input-error">
                            @if (emailControl?.errors?.['required']) {
                                Input your password first!
                            }
                        </div>
                    }
                </div>

                <div class="form-actions">
                    <button type="submit" class="ui-btn ui-btn--primary">Login</button>
                    <button (click)="cancel()" type="button" class="ui-btn ui-btn--secondary">Cancel</button>
                </div>

            </form>
        </div>

    </div>
</main>
