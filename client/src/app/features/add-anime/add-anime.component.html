<main class="page-form">
    <div class="page-form__container">

        <div class="form-card">
            <h1 class="form-card__title">Add New Anime</h1>

            <form class="form">

                <div class="form-group">
                    <label class="form-group__label">Title</label>
                    <input type="text" class="form-group__input" />
                </div>

                <div class="form-group">
                    <label class="form-group__label">Author</label>
                    <input type="text" class="form-group__input" />
                </div>

                <div class="form-group">
                    <label class="form-group__label">Production Company</label>
                    <input type="text" class="form-group__input" />
                </div>

                <div class="form-group">
                    <label class="form-group__label">Genres</label>
                    <input type="text" class="form-group__input" placeholder="e.g. Action, Drama" />
                </div>

                <div class="form-group">
                    <label class="form-group__label">Image URL</label>
                    <input type="text" class="form-group__input" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-group__label">Start Date</label>
                        <input type="date" class="form-group__input" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">End Date</label>
                        <input type="date" class="form-group__input" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-group__label">Description</label>
                    <textarea class="form-group__textarea"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="ui-btn ui-btn--primary">Add Anime</button>
                    <button type="button" class="ui-btn ui-btn--secondary">Cancel</button>
                </div>

            </form>
        </div>

    </div>
</main>
