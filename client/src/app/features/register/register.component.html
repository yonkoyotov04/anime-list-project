<main class="page-auth">
        <div class="page-auth__container">

            <div class="form-card">
                <h1 class="form-card__title">Create Account</h1>

                <form class="form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

                    <div class="form-group">
                        <label class="form-group__label">Email</label>
                        <input type="email" 
                        name="email" 
                        class="form-group__input" 
                        formControlName="email" 
                        email 
                        minlength="5" 
                        maxlength="30"/>
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Username</label>
                        <input type="text" 
                        name="username" 
                        class="form-group__input" 
                        formControlName="username" 
                        minlength="3" 
                        maxlength="30" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Password</label>
                        <input type="password" 
                        name="password" 
                        class="form-group__input" 
                        formControlName="password" 
                        minlength="6" 
                        maxlength="20" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Repeat Password</label>
                        <input type="password" 
                        name="rePassword" 
                        class="form-group__input" 
                        formControlName="rePassword" 
                        minlength="6" 
                        maxlength="20" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Profile Picture</label>
                        <input type="text" 
                        name="profilePic" 
                        class="form-group__input" 
                        formControlName="profilePic" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Bio</label>
                        <textarea name="bio" 
                        class="form-group__textarea" 
                        formControlName="bio"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="ui-btn ui-btn--primary">Register</button>
                        <button type="button" class="ui-btn ui-btn--secondary">Cancel</button>
                    </div>

                </form>
            </div>

        </div>
    </main>
