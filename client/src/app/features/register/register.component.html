<main class="page-auth">
        <div class="page-auth__container">

            <div class="form-card">
                <h1 class="form-card__title">Create Account</h1>

                <form class="form">

                    <div class="form-group">
                        <label class="form-group__label">Email</label>
                        <input type="email" class="form-group__input" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Password</label>
                        <input type="password" class="form-group__input" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Repeat Password</label>
                        <input type="password" class="form-group__input" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Profile Picture</label>
                        <input type="text" class="form-group__input" />
                    </div>

                    <div class="form-group">
                        <label class="form-group__label">Bio</label>
                        <textarea class="form-group__textarea"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="ui-btn ui-btn--primary">Register</button>
                        <button type="button" class="ui-btn ui-btn--secondary">Cancel</button>
                    </div>

                </form>
            </div>

        </div>
    </main>
