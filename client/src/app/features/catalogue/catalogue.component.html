<main class="page-catalogue">
    <div class="page-catalogue__container">
        <h1 class="page-catalogue__title">Anime Catalogue</h1>

        <div class="catalogue-controls">

            <div class="catalogue-search">
                <input type="text" class="catalogue-search__input" placeholder="Search anime..." />
            </div>

            <div class="catalogue-sort">
                <select class="catalogue-sort__select">
                    <option>Sort by Title</option>
                    <option>Sort by Rating</option>
                    <option>Sort by Start Year</option>
                    <option>Sort by End Year</option>
                </select>
            </div>

        </div>

        <div class="catalogue-list">

            <div class="catalogue-item">
                <img src="https://m.media-amazon.com/images/M/MV5BMzIyNzY4NTMtNmVhYS00OWFhLTkwMWMtOGFkNTdmNWU2ZDdiXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"
                    class="catalogue-item__image" />

                <div class="catalogue-item__content">
                    <h2 class="catalogue-item__title">JoJo's Bizarre Adventure</h2>
                    <span class="catalogue-item__years">2012 - Ongoing</span>
                </div>

                <div class="catalogue-item__rating-wrapper">
                    <span class="catalogue-item__rating">⭐ 9.0</span>
                </div>
            </div>

            <div class="catalogue-item">
                <img src="https://i.redd.it/0u2aefrzacmc1.jpeg" class="catalogue-item__image" />

                <div class="catalogue-item__content">
                    <h2 class="catalogue-item__title">One Piece</h2>
                    <span class="catalogue-item__years">1998 - Ongoing</span>
                </div>

                <div class="catalogue-item__rating-wrapper">
                    <span class="catalogue-item__rating">⭐ 9.0</span>
                </div>
            </div>

            <div class="catalogue-item">
                <img src="https://aot-portal.com/wp/wp-content/uploads/2025/11/%E5%8A%87%E5%A0%B4%E7%89%88%E9%80%B2%E6%92%83KV_logo-%E3%81%AE%E3%82%B3%E3%83%94%E3%83%BC-712x1013.jpg"
                    class="catalogue-item__image" />

                <div class="catalogue-item__content">
                    <h2 class="catalogue-item__title">Attack on Titan</h2>
                    <span class="catalogue-item__years">2013 - 2023</span>
                </div>

                <div class="catalogue-item__rating-wrapper">
                    <span class="catalogue-item__rating">⭐ 9.0</span>
                </div>
            </div>

        </div>
    </div>
</main>
