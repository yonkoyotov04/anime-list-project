<main class="page-home">
    <div class="page-home__container">

        <section class="home">
            <h1 class="home-title">Track Your Anime Journey</h1>
            <p class="home-subtitle">
                Organize what you watch, discover new anime, and share your opinions.
            </p>

            <div class="home-actions">
                <button class="ui-btn ui-btn--primary">Browse Catalogue</button>
                <button class="ui-btn ui-btn--secondary">My List</button>
            </div>
        </section>

        <section class="home-section">
            <h2 class="home-section__title">Popular Anime</h2>

            <div class="catalogue-list">

                <div class="catalogue-item">
                    <img src="https://via.placeholder.com/80x110" class="catalogue-item__image" />

                    <div class="catalogue-item__content">
                        <h2 class="catalogue-item__title">Attack on Titan</h2>
                        <span class="catalogue-item__years">2013 - 2023</span>
                    </div>

                    <div class="catalogue-item__rating-wrapper">
                        <span class="catalogue-item__rating">⭐ 9.0</span>
                    </div>
                </div>

                <div class="catalogue-item">
                    <img src="https://via.placeholder.com/80x110" class="catalogue-item__image" />

                    <div class="catalogue-item__content">
                        <h2 class="catalogue-item__title">Jujutsu Kaisen</h2>
                        <span class="catalogue-item__years">2020 - Present</span>
                    </div>

                    <div class="catalogue-item__rating-wrapper">
                        <span class="catalogue-item__rating">⭐ 8.7</span>
                    </div>
                </div>

            </div>
        </section>

        <section class="home-section">
            <h2 class="home-section__title">Quick Actions</h2>

            <div class="home-actions">
                <button class="ui-btn ui-btn--primary">Add Anime</button>
                <button class="ui-btn ui-btn--secondary">View Profile</button>
                <button class="ui-btn ui-btn--secondary">View My List</button>
            </div>
        </section>

    </div>
</main>
