<div class="review-item">

    <div class="review-item__header">
        <a [routerLink]="inUserPage ? ['/details', review.anime._id] : ['/profile', review.user._id]">
            <img 
            [src]="inUserPage ? review.anime.imageUrl : review.user.profilePic"
            class="review-item__avatar" 
            />
        </a>
        
        <span class="review-item__username">{{inUserPage ? review.anime.title : review.user.username}}</span>
        @if (inUserPage && isOwner) {
            <div class="review-item__actions">
                <button [routerLink]="['/edit/review', review._id]" class="ui-btn ui-btn--primary">
                    Edit
                </button>
                <button (click)="onDeleteClick()" class="ui-btn ui-btn--danger">
                    Delete
                </button>
            </div>
        }
        
    </div>

    <p class="review-item__text">
        {{review.comment}}
    </p>

    <div class="review-item__footer">
        <span class="review-item__rating">⭐ {{review.rating}}/10</span>
    </div>

</div>
