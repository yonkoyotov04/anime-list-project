<div class="review-item">

    <div class="review-item__header">
        <img src={{review.user.profilePic}}
            class="review-item__avatar" />
        <span class="review-item__username">{{review.user.username}}</span>
        <span class="review-item__rating">⭐ {{review.rating}}/10</span>
    </div>

    <p class="review-item__text">
        {{review.comment}}
    </p>

</div>
