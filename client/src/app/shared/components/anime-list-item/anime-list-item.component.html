<div class="list-item">
    <a [routerLink]="['/details', data.anime._id]">
        <img src={{data.anime.imageUrl}} class="list-item__image" />
    </a>

    <span class="list-item__title">{{data.anime.title}}</span>

    <div class="list-item__actions">
        <button class="ui-btn ui-btn--success">Complete</button>
        <button class="ui-btn ui-btn--danger">Drop</button>
    </div>
</div>
